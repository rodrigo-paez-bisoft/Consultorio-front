<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Consultorio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="Style/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="bi bi-hospital"></i> Sistema Consultorio</a>
            <div class="navbar-nav ms-auto">
                <div class="d-flex align-items-center">
                    <span id="userInfo" class="text-light me-3">
                        <span class="badge bg-primary me-2">Cargando...</span>
                    </span>
                    <button class="btn btn-outline-danger btn-sm" onclick="logout()">
                        <i class="bi bi-box-arrow-right"></i> Salir
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-3">
        <div class="accordion mt-4" id="mainAccordion">
            
            <!-- USUARIOS -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseUsuarios">
                        <strong>👤 Gestión de Usuarios</strong>
                    </button>
                </h2>
                <div id="collapseUsuarios" class="accordion-collapse collapse show" data-bs-parent="#mainAccordion">
                    <div class="accordion-body">
                        <div id="contenedorUsuarios"></div>
                    </div>
                </div>
            </div>

            <!-- DOCTORES -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseDoctores">
                        <strong>👨‍⚕️ Gestión de Doctores</strong>
                    </button>
                </h2>
                <div id="collapseDoctores" class="accordion-collapse collapse" data-bs-parent="#mainAccordion">
                    <div class="accordion-body">
                        <div id="contenedorDoctores"></div>
                    </div>
                </div>
            </div>

            <!-- PACIENTES -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapsePacientes">
                        <strong>👤 Gestión de Pacientes</strong>
                    </button>
                </h2>
                <div id="collapsePacientes" class="accordion-collapse collapse" data-bs-parent="#mainAccordion">
                    <div class="accordion-body">
                        <div id="contenedorPacientes"></div>
                    </div>
                </div>
            </div>

            <!-- SALAS -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseSalas">
                        <strong>🏥 Gestión de Salas</strong>
                    </button>
                </h2>
                <div id="collapseSalas" class="accordion-collapse collapse" data-bs-parent="#mainAccordion">
                    <div class="accordion-body">
                        <div id="contenedorSalas"></div>
                    </div>
                </div>
            </div>

            <!-- CITAS -->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseCitas">
                        <strong>📅 Gestión de Citas</strong>
                    </button>
                </h2>
                <div id="collapseCitas" class="accordion-collapse collapse" data-bs-parent="#mainAccordion">
                    <div class="accordion-body">
                        <div id="contenedorCitas"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="JS/api.js"></script>
    <script>
        // ========== CONFIGURACIÓN DE ENTIDADES ==========
        const ENTIDADES = {
            usuarios: {
                nombre: 'Usuarios',
                contenedor: 'contenedorUsuarios',
                archivos: {
                    create: 'Usuario/Create.html',
                    read: 'Usuario/read.html',
                    update: 'Usuario/update.html',
                    delete: 'Usuario/delete.html'
                }
            },
            doctores: {
                nombre: 'Doctores',
                contenedor: 'contenedorDoctores',
                archivos: {
                    create: 'Doctor/doctor-create.html',
                    read: 'Doctor/doctor-read.html',
                    update: 'Doctor/doctor-update.html',
                    delete: 'Doctor/doctor-delete.html'
                }
            },
            pacientes: {
                nombre: 'Pacientes',
                contenedor: 'contenedorPacientes',
                archivos: {
                    create: 'Paciente/Paciente-create.html',
                    read: 'Paciente/Paciente-read.html',
                    update: 'Paciente/Paciente-update.html',
                    delete: 'Paciente/Paciente-delete.html'
                }
            },
            salas: {
                nombre: 'Salas',
                contenedor: 'contenedorSalas',
                archivos: {
                    create: 'Sala/Sala-create.html',
                    read: 'Sala/Sala-read.html',
                    update: 'Sala/Sala-update.html',
                    delete: 'Sala/Sala-delete.html'
                }
            },
            citas: {
                nombre: 'Citas',
                contenedor: 'contenedorCitas',
                archivos: {
                    create: 'Cita/Cita-create.html',
                    read: 'Cita/read.html',
                    update: 'Cita/update.html',
                    delete: 'Cita/delete.html'
                }
            }
        };

        // ========== FUNCIONES DE CARGA ==========
        async function cargarFormulario(ruta, contenedorId) {
            try {
                const respuesta = await fetch(`Forms/${ruta}`);
                if (!respuesta.ok) {
                    throw new Error(`Error ${respuesta.status}: ${respuesta.statusText}`);
                }
                const html = await respuesta.text();
                const contenedor = document.getElementById(contenedorId);
                if (contenedor) {
                    contenedor.innerHTML = html;
                    // Disparar evento para que los scripts se ejecuten
                    contenedor.dispatchEvent(new CustomEvent('formLoaded', {
                        detail: { ruta, contenedorId }
                    }));
                }
            } catch (error) {
                console.error(`Error cargando ${ruta}:`, error);
                const contenedor = document.getElementById(contenedorId);
                if (contenedor) {
                    contenedor.innerHTML = `
                        <div class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle-fill"></i>
                            Error al cargar el formulario: ${error.message}
                        </div>
                    `;
                }
            }
        }

        // ========== GENERAR SUB-ACORDEÓN CRUD ==========
        function generarSubAcordeonCRUD(entidad) {
            const operaciones = [
                { id: 'create', icono: 'bi-plus-circle-fill', color: 'success', label: 'Crear' },
                { id: 'read', icono: 'bi-eye-fill', color: 'primary', label: 'Consultar' },
                { id: 'update', icono: 'bi-pencil-fill', color: 'warning', label: 'Actualizar' },
                { id: 'delete', icono: 'bi-trash-fill', color: 'danger', label: 'Eliminar' }
            ];

            const items = operaciones.map((op, index) => {
                const isFirst = index === 0;
                const contenedorId = `${entidad.contenedor}${op.id.charAt(0).toUpperCase() + op.id.slice(1)}`;
                const collapsId = `${entidad.nombre.toLowerCase()}${op.id.charAt(0).toUpperCase() + op.id.slice(1)}`;

                return `
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button ${isFirst ? '' : 'collapsed'}" 
                                    type="button" 
                                    data-bs-toggle="collapse" 
                                    data-bs-target="#${collapsId}">
                                <i class="bi ${op.icono} text-${op.color} me-2"></i> 
                                ${op.label} ${entidad.nombre}
                            </button>
                        </h2>
                        <div id="${collapsId}" 
                             class="accordion-collapse collapse ${isFirst ? 'show' : ''}" 
                             data-bs-parent="#crud${entidad.nombre}">
                            <div class="accordion-body">
                                <div id="${contenedorId}">
                                    <div class="text-muted">⏳ Cargando...</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            return `
                <div class="accordion" id="crud${entidad.nombre}">
                    ${items.join('')}
                </div>
            `;
        }

        // ========== CARGAR TODAS LAS ENTIDADES ==========
        function cargarTodasLasEntidades() {
            Object.entries(ENTIDADES).forEach(([key, entidad]) => {
                const contenedor = document.getElementById(entidad.contenedor);
                if (contenedor) {
                    contenedor.innerHTML = generarSubAcordeonCRUD(entidad);
                    
                    // Cargar cada formulario después de un pequeño retraso
                    Object.entries(entidad.archivos).forEach(([operacion, ruta]) => {
                        const contenedorId = `${entidad.contenedor}${operacion.charAt(0).toUpperCase() + operacion.slice(1)}`;
                        setTimeout(() => {
                            cargarFormulario(ruta, contenedorId);
                        }, 150);
                    });
                }
            });
        }

        // ========== EVENTOS ==========
        document.addEventListener('DOMContentLoaded', function() {
            // Verificar autenticación
            const token = localStorage.getItem('token');
            console.log('🔍 Index - Token:', token ? '✅ Presente' : '❌ No existe');
            
            if (!token) {
                console.log('🔒 Redirigiendo a login');
                window.location.href = 'login.html';
                return;
            }
            
            // Mostrar información del usuario
            const usuario = getUsuarioInfo();
            const userInfo = document.getElementById('userInfo');
            if (usuario) {
                console.log('👤 Usuario:', usuario);
                userInfo.innerHTML = `
                    <span class="badge bg-primary me-2">${usuario.rol || 'Usuario'}</span>
                    <span class="text-light">${usuario.nombre || usuario.username}</span>
                `;
            }
            
            // Cargar todos los formularios
            cargarTodasLasEntidades();
        });

        // Escuchar eventos de formularios cargados
        document.addEventListener('formLoaded', (event) => {
            console.log(`✅ Formulario cargado: ${event.detail.ruta}`);
        });

        // Función de logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('usuario');
            window.location.href = 'login.html';
        }

        // Función para obtener información del usuario
        function getUsuarioInfo() {
            try {
                const data = localStorage.getItem('usuario');
                return data ? JSON.parse(data) : null;
            } catch {
                return null;
            }
        }
    </script>
</body>
</html>
