<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Consultorio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
        }
        .login-card h3 { color: #333; font-weight: 600; }
        .login-card .subtitle { color: #6c757d; font-size: 14px; margin-bottom: 25px; }
        .login-card .form-control { border-radius: 10px; padding: 12px 15px; }
        .login-card .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: all 0.3s ease;
        }
        .login-card .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4); }
        .login-card .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }
        .alert { border-radius: 10px; margin-top: 15px; }
        .input-group-text { background: #f8f9fa; border-radius: 10px 0 0 10px; }
        .input-group .form-control { border-radius: 0 10px 10px 0; }
        .password-wrapper { position: relative; }
        .password-wrapper .form-control { padding-right: 45px; }
        .toggle-password {
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
            z-index: 10;
        }
        .toggle-password:hover { color: #333; }
        .endpoint-info {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            margin-top: 10px;
        }
        .endpoint-info code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            color: #0d6efd;
        }
        .btn-test {
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 8px 15px;
            font-size: 13px;
        }
        .btn-test:hover { background: #5a6268; color: white; }
        .token-display {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 10px;
            font-size: 11px;
            word-break: break-all;
            margin-top: 10px;
            max-height: 80px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center">
            <i class="bi bi-hospital fs-1 text-primary"></i>
            <h3>Sistema Consultorio</h3>
            <p class="subtitle">Inicia sesión para acceder al sistema</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" placeholder="Ingresa tu usuario" value="admin" required autofocus>
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Contraseña</label>
                <div class="input-group password-wrapper">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="Ingresa tu contraseña" value="admin123" required>
                    <span class="toggle-password" onclick="togglePasswordVisibility()">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn btn-login" id="loginBtn">
                <i class="bi bi-box-arrow-in-right me-2"></i> Iniciar Sesión
            </button>

            <div class="d-flex justify-content-between mt-3">
                <button type="button" class="btn-test" onclick="testConexion()">
                    <i class="bi bi-wifi"></i> Probar API
                </button>
                <small class="text-muted align-self-center">admin / admin123</small>
            </div>

            <div id="mensajeLogin" class="mt-3"></div>
            <div id="testResultado" class="mt-2"></div>
            
            <div class="endpoint-info">
                <i class="bi bi-check-circle-fill text-success"></i> 
                Conectando a: <code id="apiUrlDisplay"></code>
            </div>

            <div id="tokenDisplay" class="token-display" style="display:none;">
                <strong>Token guardado:</strong><br>
                <span id="tokenValue"></span>
            </div>
        </form>
    </div>

    <script>
        // URL correcta
        const API_URL = 'https://localhost:7285/api/auth/';
        document.getElementById('apiUrlDisplay').textContent = API_URL;

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.className = 'bi bi-eye-slash';
            } else {
                passwordInput.type = 'password';
                toggleIcon.className = 'bi bi-eye';
            }
        }

        // ✅ ELIMINAR la redirección automática en login
        // No redirigir automáticamente si hay token

        async function testConexion() {
            const testDiv = document.getElementById('testResultado');
            testDiv.innerHTML = '<div class="alert alert-info">⏳ Probando conexión...</div>';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'admin123' })
                });
                
                const status = response.status;
                let text = '';
                try { text = await response.text(); } catch (e) {}
                
                const icon = response.ok ? '✅' : '❌';
                const statusClass = response.ok ? 'success' : 'warning';
                
                let html = `
                    <div class="alert alert-${statusClass}">
                        ${icon} <strong>Login</strong> ${API_URL}<br>
                        Status: <strong>${status}</strong> ${response.statusText}
                `;
                
                if (text) {
                    try {
                        const json = JSON.parse(text);
                        html += `<br>✅ Respuesta JSON: <pre class="mt-2 p-2 bg-light" style="max-height:150px;overflow:auto;font-size:12px;">${JSON.stringify(json, null, 2)}</pre>`;
                        if (json.token) {
                            html += `<br>✅ Token: ${json.token.substring(0, 30)}...`;
                        }
                    } catch {
                        html += `<br>📄 Respuesta: ${text}`;
                    }
                }
                html += `</div>`;
                testDiv.innerHTML = html;
            } catch (error) {
                testDiv.innerHTML = `
                    <div class="alert alert-danger">
                        ❌ Error: ${error.message}<br>
                        <small>Verifica que el servidor esté corriendo en https://localhost:7285</small>
                    </div>
                `;
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const mensajeDiv = document.getElementById('mensajeLogin');

            if (!username || !password) {
                mostrarMensaje('warning', '⚠️ Ingresa usuario y contraseña', mensajeDiv);
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Iniciando...';

            try {
                console.log('🔐 Intentando login para:', username);
                console.log('📍 URL:', API_URL);

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                console.log('📡 Status:', response.status);

                if (!response.ok) {
                    let errorMsg = `Error ${response.status}: ${response.statusText}`;
                    try {
                        const data = await response.json();
                        errorMsg = data.message || data.mensaje || errorMsg;
                    } catch (e) {}
                    throw new Error(errorMsg);
                }

                const data = await response.json();
                console.log('📦 Respuesta:', data);
                
                if (!data.token) {
                    throw new Error('No se recibió token');
                }

                console.log('✅ Token recibido:', data.token.substring(0, 30) + '...');
                
                // ✅ Guardar token correctamente en localStorage
                localStorage.setItem('token', data.token);
                localStorage.setItem('usuario', JSON.stringify({
                    id: data.usuarioId || data.id || 'admin-id',
                    nombre: data.nombre || data.usuario || 'Administrador',
                    username: data.username || username,
                    rol: data.rol || 'Admin'
                }));

                // Verificar que se guardó
                const savedToken = localStorage.getItem('token');
                const savedUser = localStorage.getItem('usuario');
                console.log('✅ Token guardado en localStorage:', savedToken ? 'Sí' : 'No');
                console.log('✅ Usuario guardado:', savedUser ? 'Sí' : 'No');

                // Mostrar token en la interfaz
                document.getElementById('tokenDisplay').style.display = 'block';
                document.getElementById('tokenValue').textContent = savedToken;

                mostrarMensaje('success', '✅ ¡Bienvenido! Redirigiendo...', mensajeDiv);

                // ✅ Redirigir después de 2 segundos
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);

            } catch (error) {
                console.error('❌ Error:', error);
                mostrarMensaje('danger', `❌ ${error.message}`, mensajeDiv);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i> Iniciar Sesión';
            }
        });

        function mostrarMensaje(tipo, texto, contenedor) {
            const colores = { success: 'success', danger: 'danger', info: 'info', warning: 'warning' };
            contenedor.innerHTML = `
                <div class="alert alert-${colores[tipo] || 'info'} alert-dismissible fade show" role="alert">
                    ${texto}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            setTimeout(() => {
                const alert = contenedor.querySelector('.alert');
                if (alert) {
                    alert.classList.remove('show');
                    setTimeout(() => contenedor.innerHTML = '', 300);
                }
            }, 8000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            console.log('📄 Login cargado');
            console.log('🔧 API URL:', API_URL);
            
            // ✅ NO limpiar el token automáticamente
            // Solo limpiar si el usuario quiere hacer logout
            // localStorage.removeItem('token');
            // localStorage.removeItem('usuario');
            
            // Verificar si ya hay token
            const token = localStorage.getItem('token');
            if (token) {
                console.log('🔑 Token encontrado en login:', token.substring(0, 30) + '...');
                document.getElementById('tokenDisplay').style.display = 'block';
                document.getElementById('tokenValue').textContent = token;
                mostrarMensaje('info', 'ℹ️ Ya tienes una sesión activa. Puedes ir al <a href="index.html">dashboard</a>', document.getElementById('mensajeLogin'));
            }
            
            setTimeout(testConexion, 500);
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
