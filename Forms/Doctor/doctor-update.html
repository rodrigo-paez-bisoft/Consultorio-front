<div>
    <h5>Actualizar Doctor</h5>
    
    <!-- Formulario para buscar por GUID -->
    <form id="buscarDoctorForm" class="row g-3 mb-4">
        <div class="col-8">
            <label for="updateDoctorGuid" class="form-label">ID del Doctor (GUID)</label>
            <input type="text" 
                   class="form-control" 
                   id="updateDoctorGuid" 
                   placeholder="Ej: 123e4567-e89b-12d3-a456-426614174000"
                   pattern="^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$">
            <small class="text-muted">Ingresa el GUID del doctor que deseas actualizar</small>
        </div>
        <div class="col-4 d-flex align-items-end">
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-search"></i> Buscar Doctor
            </button>
        </div>
    </form>

    <!-- Div donde se mostrarán los datos del doctor para editar -->
    <div id="doctorUpdateInfo" class="mt-3">
        <!-- Los datos se mostrarán aquí cuando se consulte el doctor -->
    </div>

    <!-- Mensajes de feedback -->
    <div id="mensajeUpdate" class="mt-3"></div>
</div>

<script>
    (function() {
        const buscarForm = document.getElementById('buscarDoctorForm');
        const guidInput = document.getElementById('updateDoctorGuid');
        const infoDiv = document.getElementById('doctorUpdateInfo');
        const mensajeDiv = document.getElementById('mensajeUpdate');

        // Variable para almacenar el doctor actual
        let doctorActual = null;

        // ========== MOSTRAR MENSAJES ==========
        function mostrarMensaje(tipo, texto) {
            const colores = {
                success: 'success',
                danger: 'danger',
                info: 'info',
                warning: 'warning'
            };
            
            mensajeDiv.innerHTML = `
                <div class="alert alert-${colores[tipo] || 'info'} alert-dismissible fade show" role="alert">
                    ${texto}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            setTimeout(() => {
                const alert = mensajeDiv.querySelector('.alert');
                if (alert) {
                    alert.classList.remove('show');
                    setTimeout(() => mensajeDiv.innerHTML = '', 300);
                }
            }, 5000);
        }

        // ========== MOSTRAR FORMULARIO DE EDICIÓN ==========
        function mostrarFormularioEdicion(doctor) {
            doctorActual = doctor;

            infoDiv.innerHTML = `
                <div class="card shadow-sm">
                    <div class="card-header bg-warning text-dark">
                        <h5 class="mb-0"><i class="bi bi-pencil-square"></i> Editar Doctor</h5>
                    </div>
                    <div class="card-body">
                        <form id="editarDoctorForm" class="row g-3">
                            <!-- ID (solo lectura) -->
                            <div class="col-12">
                                <label class="fw-bold text-muted small">ID del Doctor</label>
                                <input type="text" 
                                       class="form-control bg-light" 
                                       value="${doctor.id || doctor.doctorId || 'N/A'}" 
                                       disabled>
                                <small class="text-muted">El ID no se puede modificar</small>
                            </div>
                            
                            <!-- Nombre -->
                            <div class="col-md-6">
                                <label for="editNombre" class="form-label">Nombre</label>
                                <input type="text" 
                                       class="form-control" 
                                       id="editNombre" 
                                       value="${doctor.nombre || doctor.name || ''}"
                                       placeholder="Ingresa el nombre del doctor">
                            </div>
                            
                            <!-- Especialidad -->
                            <div class="col-md-6">
                                <label for="editEspecialidad" class="form-label">Especialidad</label>
                                <select class="form-select" id="editEspecialidad">
                                    <option value="">Selecciona una especialidad...</option>
                                    <option value="cardiologia" ${doctor.especialidad === 'cardiologia' ? 'selected' : ''}>Cardiología</option>
                                    <option value="dermatologia" ${doctor.especialidad === 'dermatologia' ? 'selected' : ''}>Dermatología</option>
                                    <option value="ginecologia" ${doctor.especialidad === 'ginecologia' ? 'selected' : ''}>Ginecología</option>
                                    <option value="pediatria" ${doctor.especialidad === 'pediatria' ? 'selected' : ''}>Pediatría</option>
                                    <option value="neurologia" ${doctor.especialidad === 'neurologia' ? 'selected' : ''}>Neurología</option>
                                    <option value="ortopedia" ${doctor.especialidad === 'ortopedia' ? 'selected' : ''}>Ortopedia</option>
                                    <option value="oftalmologia" ${doctor.especialidad === 'oftalmologia' ? 'selected' : ''}>Oftalmología</option>
                                    <option value="psiquiatria" ${doctor.especialidad === 'psiquiatria' ? 'selected' : ''}>Psiquiatría</option>
                                    <option value="cirugia-general" ${doctor.especialidad === 'cirugia-general' ? 'selected' : ''}>Cirugía General</option>
                                    <option value="medicina-interna" ${doctor.especialidad === 'medicina-interna' ? 'selected' : ''}>Medicina Interna</option>
                                    <option value="anestesiologia" ${doctor.especialidad === 'anestesiologia' ? 'selected' : ''}>Anestesiología</option>
                                    <option value="radiologia" ${doctor.especialidad === 'radiologia' ? 'selected' : ''}>Radiología</option>
                                    <option value="urologia" ${doctor.especialidad === 'urologia' ? 'selected' : ''}>Urología</option>
                                    <option value="reumatologia" ${doctor.especialidad === 'reumatologia' ? 'selected' : ''}>Reumatología</option>
                                    <option value="nefrologia" ${doctor.especialidad === 'nefrologia' ? 'selected' : ''}>Nefrología</option>
                                    <option value="hematologia" ${doctor.especialidad === 'hematologia' ? 'selected' : ''}>Hematología</option>
                                    <option value="infectologia" ${doctor.especialidad === 'infectologia' ? 'selected' : ''}>Infectología</option>
                                    <option value="geriatria" ${doctor.especialidad === 'geriatria' ? 'selected' : ''}>Geriatría</option>
                                </select>
                            </div>

                            <!-- Botones de acción -->
                            <div class="col-12 mt-3">
                                <hr>
                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-success">
                                        <i class="bi bi-check-circle"></i> Guardar Cambios
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary" onclick="limpiarFormulario()">
                                        <i class="bi bi-arrow-counterclockwise"></i> Cancelar
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            `;

            // Evento para el formulario de edición
            const editarForm = document.getElementById('editarDoctorForm');
            editarForm.addEventListener('submit', function(e) {
                e.preventDefault();
                actualizarDoctor();
            });
        }

        // ========== LIMPIAR FORMULARIO ==========
        window.limpiarFormulario = function() {
            infoDiv.innerHTML = '';
            doctorActual = null;
            guidInput.value = '';
            mostrarMensaje('info', 'Formulario limpiado');
        };

        // ========== ACTUALIZAR DOCTOR ==========
        async function actualizarDoctor() {
            const nombre = document.getElementById('editNombre').value.trim();
            const especialidad = document.getElementById('editEspecialidad').value;

            // Validar campos
            if (!nombre) {
                mostrarMensaje('warning', '⚠️ El nombre es obligatorio');
                return;
            }

            if (!especialidad) {
                mostrarMensaje('warning', '⚠️ La especialidad es obligatoria');
                return;
            }

            // Construir objeto de actualización
            const doctorId = doctorActual.id || doctorActual.doctorId;
            const datosActualizar = {
                id: doctorId,
                nombre: nombre,
                especialidad: especialidad
            };

            try {
                mostrarMensaje('info', '⏳ Actualizando doctor...');

                // URL de la API - AJUSTAR SEGÚN TU ENDPOINT
                const url = `https://localhost:7285/api/Doctor/${doctorId}`;
                // const url = `/api/Doctor/${doctorId}`;

                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(datosActualizar)
                });

                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error(`Doctor con ID ${doctorId} no encontrado`);
                    }
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.message || `Error ${response.status}: ${response.statusText}`);
                }

                const resultado = await response.json();
                
                mostrarMensaje('success', `✅ Doctor actualizado correctamente`);
                
                // Actualizar los datos mostrados con la respuesta
                if (resultado) {
                    mostrarFormularioEdicion(resultado);
                    mostrarMensaje('success', `✅ Doctor "${resultado.nombre}" actualizado correctamente`);
                }

            } catch (error) {
                console.error('Error al actualizar doctor:', error);
                mostrarMensaje('danger', `❌ ${error.message}`);
            }
        }

        // ========== BUSCAR DOCTOR ==========
        async function buscarDoctor(guid) {
            // Limpiar datos anteriores
            infoDiv.innerHTML = '';
            doctorActual = null;
            
            // Validar GUID
            if (!guid) {
                mostrarMensaje('warning', '⚠️ Por favor, ingresa un ID de doctor');
                return;
            }

            // Validar formato GUID
            const guidRegex = /^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$/;
            if (!guidRegex.test(guid)) {
                mostrarMensaje('danger', '❌ Formato de GUID inválido. Usa el formato: 00000000-0000-0000-0000-000000000000');
                return;
            }

            try {
                mostrarMensaje('info', '⏳ Buscando doctor...');
                
                // URL de la API - AJUSTAR SEGÚN TU ENDPOINT
                const url = `https://localhost:7285/api/Doctor/${guid}`;
                // const url = `/api/Doctor/${guid}`;
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error(`Doctor con ID ${guid} no encontrado`);
                    }
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }
                
                const doctor = await response.json();
                
                if (doctor) {
                    mostrarFormularioEdicion(doctor);
                    mostrarMensaje('success', `✅ Doctor "${doctor.nombre || doctor.name}" encontrado. Puedes editar los campos.`);
                } else {
                    throw new Error('No se recibieron datos del doctor');
                }
                
            } catch (error) {
                console.error('Error al buscar doctor:', error);
                mostrarMensaje('danger', `❌ ${error.message}`);
                infoDiv.innerHTML = `
                    <div class="text-center text-muted py-5">
                        <i class="bi bi-person-x fs-1 d-block mb-2"></i>
                        Doctor no encontrado
                    </div>
                `;
            }
        }

        // ========== EVENTOS ==========
        buscarForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const guid = guidInput.value.trim();
            buscarDoctor(guid);
        });

        // Permitir búsqueda con Enter
        guidInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                buscarForm.dispatchEvent(new Event('submit'));
            }
        });

        // Autoformatear GUID mientras se escribe
        guidInput.addEventListener('input', function(e) {
            let value = this.value.replace(/[^a-fA-F0-9-]/g, '');
            value = value.replace(/-{2,}/g, '-');
            this.value = value;
        });

    })();
</script>

<!-- Estilos adicionales -->
<style>
    .card {
        border-radius: 12px;
        border: none;
        overflow: hidden;
    }
    .card-header {
        border-bottom: none;
    }
    .card-body .fw-bold {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .form-control:disabled {
        background-color: #e9ecef;
        cursor: not-allowed;
    }
    .alert {
        border-radius: 8px;
    }
    input:focus, select:focus {
        box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        border-color: #86b7fe;
    }
    .btn-outline-secondary:hover {
        background-color: #6c757d;
        color: white;
    }
    .btn-success:hover {
        background-color: #1e7e34;
    }
</style>
