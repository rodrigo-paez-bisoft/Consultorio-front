<div>
    <h5>Eliminar Sala (Eliminación Lógica)</h5>
    
    <div class="alert alert-info">
        <i class="bi bi-info-circle"></i>
        <strong>Eliminación Lógica:</strong> La sala será desactivada pero su información permanecerá en el sistema.
    </div>

    <!-- Formulario para buscar por GUID -->
    <form id="buscarSalaForm" class="row g-3 mb-4">
        <div class="col-8">
            <label for="deleteSalaGuid" class="form-label">ID de la Sala (GUID)</label>
            <input type="text" 
                   class="form-control" 
                   id="deleteSalaGuid" 
                   placeholder="Ej: 123e4567-e89b-12d3-a456-426614174000"
                   pattern="^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$">
            <small class="text-muted">Ingresa el GUID de la sala que deseas eliminar</small>
        </div>
        <div class="col-4 d-flex align-items-end">
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-search"></i> Buscar Sala
            </button>
        </div>
    </form>

    <!-- Div donde se mostrarán los datos de la sala para confirmar eliminación -->
    <div id="salaDeleteInfo" class="mt-3">
        <!-- Los datos se mostrarán aquí cuando se consulte la sala -->
    </div>

    <!-- Mensajes de feedback -->
    <div id="mensajeDelete" class="mt-3"></div>
</div>

<script>
    (function() {
        const buscarForm = document.getElementById('buscarSalaForm');
        const guidInput = document.getElementById('deleteSalaGuid');
        const infoDiv = document.getElementById('salaDeleteInfo');
        const mensajeDiv = document.getElementById('mensajeDelete');

        // Variable para almacenar la sala actual
        let salaActual = null;

        // ========== MOSTRAR MENSAJES ==========
        function mostrarMensaje(tipo, texto) {
            const colores = {
                success: 'success',
                danger: 'danger',
                info: 'info',
                warning: 'warning'
            };
            
            mensajeDiv.innerHTML = `
                <div class="alert alert-${colores[tipo] || 'info'} alert-dismissible fade show" role="alert">
                    ${texto}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            setTimeout(() => {
                const alert = mensajeDiv.querySelector('.alert');
                if (alert) {
                    alert.classList.remove('show');
                    setTimeout(() => mensajeDiv.innerHTML = '', 300);
                }
            }, 8000);
        }

        // ========== MOSTRAR CONFIRMACIÓN DE ELIMINACIÓN ==========
        function mostrarConfirmacionEliminacion(sala) {
            salaActual = sala;

            infoDiv.innerHTML = `
                <div class="card shadow-sm border-danger">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Confirmar Eliminación</h5>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-warning">
                            <i class="bi bi-exclamation-triangle-fill"></i>
                            <strong>¿Estás seguro de que deseas eliminar esta sala?</strong>
                            <br>
                            Esta acción es una <strong>eliminación lógica</strong>. La sala será desactivada pero su información permanecerá en el sistema.
                        </div>

                        <div class="row g-3">
                            <!-- ID -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">ID</label>
                                <p class="border-bottom pb-2">${sala.id || sala.salaId || 'N/A'}</p>
                            </div>
                            <!-- Número -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Número de Sala</label>
                                <p class="border-bottom pb-2"><strong>${sala.numero || sala.number || 'N/A'}</strong></p>
                            </div>
                            <!-- Tipo -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Tipo de Sala</label>
                                <p class="border-bottom pb-2">
                                    <span class="badge bg-primary">${sala.tipo || sala.type || 'N/A'}</span>
                                </p>
                            </div>
                            <!-- Capacidad -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Capacidad</label>
                                <p class="border-bottom pb-2">
                                    <span class="badge bg-secondary">
                                        <i class="bi bi-people"></i> ${sala.capacidad || sala.capacity || 'N/A'} personas
                                    </span>
                                </p>
                            </div>
                            <!-- Estado -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Estado Actual</label>
                                <p class="border-bottom pb-2">
                                    <span class="badge ${sala.estado === 'disponible' ? 'bg-success' : sala.estado === 'ocupada' ? 'bg-danger' : sala.estado === 'mantenimiento' ? 'bg-warning text-dark' : 'bg-secondary'}">
                                        ${sala.estado || sala.status || 'N/A'}
                                    </span>
                                </p>
                            </div>
                            <!-- Piso -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Piso</label>
                                <p class="border-bottom pb-2">${sala.piso || sala.floor || 'N/A'}</p>
                            </div>
                        </div>

                        <!-- Botones de acción -->
                        <div class="mt-3">
                            <hr>
                            <div class="d-flex gap-2">
                                <button id="btnEliminarSala" class="btn btn-danger">
                                    <i class="bi bi-trash"></i> Confirmar Eliminación Lógica
                                </button>
                                <button type="button" class="btn btn-outline-secondary" onclick="limpiarFormulario()">
                                    <i class="bi bi-arrow-counterclockwise"></i> Cancelar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Evento para el botón de eliminar
            document.getElementById('btnEliminarSala').addEventListener('click', function() {
                eliminarSala();
            });
        }

        // ========== LIMPIAR FORMULARIO ==========
        window.limpiarFormulario = function() {
            infoDiv.innerHTML = '';
            salaActual = null;
            guidInput.value = '';
            mostrarMensaje('info', 'Formulario limpiado');
        };

        // ========== ELIMINAR SALA (LÓGICO) ==========
        async function eliminarSala() {
            const salaId = salaActual.id || salaActual.salaId;
            const numero = salaActual.numero || salaActual.number || 'Sin número';

            try {
                mostrarMensaje('info', '⏳ Procesando eliminación lógica...');

                // URL de la API - AJUSTAR SEGÚN TU ENDPOINT
                const url = `https://localhost:7285/api/Sala/${salaId}`;
                // const url = `/api/Sala/${salaId}`;

                const response = await fetch(url, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error(`Sala con ID ${salaId} no encontrada`);
                    }
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.message || `Error ${response.status}: ${response.statusText}`);
                }

                const resultado = await response.json().catch(() => ({}));
                
                mostrarMensaje('success', `✅ Sala "${numero}" eliminada lógicamente correctamente`);
                
                // Limpiar el formulario después de eliminar
                setTimeout(() => {
                    limpiarFormulario();
                }, 3000);

            } catch (error) {
                console.error('Error al eliminar sala:', error);
                mostrarMensaje('danger', `❌ ${error.message}`);
            }
        }

        // ========== BUSCAR SALA ==========
        async function buscarSala(guid) {
            // Limpiar datos anteriores
            infoDiv.innerHTML = '';
            salaActual = null;
            
            // Validar GUID
            if (!guid) {
                mostrarMensaje('warning', '⚠️ Por favor, ingresa un ID de sala');
                return;
            }

            // Validar formato GUID
            const guidRegex = /^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$/;
            if (!guidRegex.test(guid)) {
                mostrarMensaje('danger', '❌ Formato de GUID inválido. Usa el formato: 00000000-0000-0000-0000-000000000000');
                return;
            }

            try {
                mostrarMensaje('info', '⏳ Buscando sala...');
                
                // URL de la API - AJUSTAR SEGÚN TU ENDPOINT
                const url = `https://localhost:7285/api/Sala/${guid}`;
                // const url = `/api/Sala/${guid}`;
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error(`Sala con ID ${guid} no encontrada`);
                    }
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }
                
                const sala = await response.json();
                
                if (sala) {
                    // Verificar si la sala ya está inactiva (si existe el campo)
                    if (sala.activo === false) {
                        mostrarMensaje('warning', `⚠️ La sala "${sala.numero || sala.number}" ya se encuentra inactiva`);
                        infoDiv.innerHTML = `
                            <div class="text-center text-muted py-4">
                                <i class="bi bi-building-check fs-1 d-block mb-2"></i>
                                <p>Esta sala ya fue desactivada anteriormente</p>
                            </div>
                        `;
                        return;
                    }
                    
                    mostrarConfirmacionEliminacion(sala);
                    mostrarMensaje('info', `ℹ️ Sala "${sala.numero || sala.number}" encontrada. Confirma la eliminación lógica.`);
                } else {
                    throw new Error('No se recibieron datos de la sala');
                }
                
            } catch (error) {
                console.error('Error al buscar sala:', error);
                mostrarMensaje('danger', `❌ ${error.message}`);
                infoDiv.innerHTML = `
                    <div class="text-center text-muted py-5">
                        <i class="bi bi-building-x fs-1 d-block mb-2"></i>
                        Sala no encontrada
                    </div>
                `;
            }
        }

        // ========== EVENTOS ==========
        buscarForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const guid = guidInput.value.trim();
            buscarSala(guid);
        });

        // Permitir búsqueda con Enter
        guidInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                buscarForm.dispatchEvent(new Event('submit'));
            }
        });

        // Autoformatear GUID mientras se escribe
        guidInput.addEventListener('input', function(e) {
            let value = this.value.replace(/[^a-fA-F0-9-]/g, '');
            value = value.replace(/-{2,}/g, '-');
            this.value = value;
        });

    })();
</script>

<!-- Estilos adicionales -->
<style>
    .card {
        border-radius: 12px;
        border: none;
        overflow: hidden;
    }
    .card-header {
        border-bottom: none;
    }
    .card-body .fw-bold {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .border-bottom {
        border-bottom: 1px solid #e9ecef !important;
        padding-bottom: 8px;
    }
    .alert {
        border-radius: 8px;
    }
    input:focus {
        box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        border-color: #86b7fe;
    }
    .btn-danger:hover {
        background-color: #bb2d3b;
    }
</style>
