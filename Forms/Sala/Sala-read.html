<div>
    <h5>Consultar Sala por ID</h5>
    
    <form id="consultarSalaForm" class="row g-3">
        <!-- Campo para ingresar el GUID -->
        <div class="col-8">
            <label for="salaGuid" class="form-label">ID de la Sala (GUID)</label>
            <input type="text" 
                   class="form-control" 
                   id="salaGuid" 
                   placeholder="Ej: 123e4567-e89b-12d3-a456-426614174000"
                   pattern="^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$">
            <small class="text-muted">Formato: 00000000-0000-0000-0000-000000000000</small>
        </div>
        <div class="col-4 d-flex align-items-end">
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-search"></i> Consultar
            </button>
        </div>
    </form>

    <!-- Div donde se mostrarán los datos de la sala -->
    <div id="salaInfo" class="mt-4">
        <!-- Los datos se mostrarán aquí -->
    </div>

    <!-- Mensajes de feedback -->
    <div id="mensajeConsulta" class="mt-3"></div>
</div>

<script>
    (function() {
        const form = document.getElementById('consultarSalaForm');
        const guidInput = document.getElementById('salaGuid');
        const infoDiv = document.getElementById('salaInfo');
        const mensajeDiv = document.getElementById('mensajeConsulta');

        // ========== MOSTRAR MENSAJES ==========
        function mostrarMensaje(tipo, texto) {
            const colores = {
                success: 'success',
                danger: 'danger',
                info: 'info',
                warning: 'warning'
            };
            
            mensajeDiv.innerHTML = `
                <div class="alert alert-${colores[tipo] || 'info'} alert-dismissible fade show" role="alert">
                    ${texto}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            setTimeout(() => {
                const alert = mensajeDiv.querySelector('.alert');
                if (alert) {
                    alert.classList.remove('show');
                    setTimeout(() => mensajeDiv.innerHTML = '', 300);
                }
            }, 5000);
        }

        // ========== OBTENER ICONO SEGÚN TIPO DE SALA ==========
        function getIconoTipo(tipo) {
            const tipos = {
                'consulta': 'bi bi-clipboard-heart',
                'cirugia': 'bi bi-scissors',
                'emergencia': 'bi bi-hospital',
                'hospitalizacion': 'bi bi-person-check',
                'terapia': 'bi bi-heart-pulse',
                'rayos': 'bi bi-x-ray',
                'laboratorio': 'bi bi-flask'
            };
            return tipos[tipo?.toLowerCase()] || 'bi bi-building';
        }

        // ========== OBTENER BADGE SEGÚN ESTADO ==========
        function getBadgeEstado(estado) {
            const estados = {
                'disponible': 'bg-success',
                'ocupada': 'bg-danger',
                'mantenimiento': 'bg-warning text-dark',
                'reservada': 'bg-info',
                'limpieza': 'bg-secondary'
            };
            const color = estados[estado?.toLowerCase()] || 'bg-secondary';
            const texto = estado || 'N/A';
            return `<span class="badge ${color}">${texto}</span>`;
        }

        // ========== OBTENER BADGE TIPO ==========
        function getBadgeTipo(tipo) {
            const tipos = {
                'consulta': 'bg-primary',
                'cirugia': 'bg-danger',
                'emergencia': 'bg-warning text-dark',
                'hospitalizacion': 'bg-success',
                'terapia': 'bg-info',
                'rayos': 'bg-purple',
                'laboratorio': 'bg-secondary'
            };
            const color = tipos[tipo?.toLowerCase()] || 'bg-secondary';
            const texto = tipo || 'N/A';
            return `<span class="badge ${color}">${texto}</span>`;
        }

        // ========== MOSTRAR DATOS DE LA SALA ==========
        function mostrarSala(sala) {
            // Función para formatear fecha
            function formatearFecha(fecha) {
                if (!fecha) return 'N/A';
                try {
                    return new Date(fecha).toLocaleDateString('es-ES', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                } catch {
                    return 'N/A';
                }
            }

            // Icono según tipo
            const iconoTipo = getIconoTipo(sala.tipo);

            infoDiv.innerHTML = `
                <div class="card shadow-sm">
                    <div class="card-header bg-warning text-dark">
                        <h5 class="mb-0"><i class="${iconoTipo}"></i> Información de la Sala</h5>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <!-- ID -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">ID</label>
                                <p class="border-bottom pb-2">${sala.id || sala.salaId || 'N/A'}</p>
                            </div>
                            <!-- Número de Sala -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Número de Sala</label>
                                <p class="border-bottom pb-2">
                                    <strong>${sala.numero || sala.number || 'N/A'}</strong>
                                </p>
                            </div>
                            <!-- Tipo de Sala -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Tipo de Sala</label>
                                <p class="border-bottom pb-2">
                                    ${getBadgeTipo(sala.tipo || sala.type)}
                                </p>
                            </div>
                            <!-- Capacidad -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Capacidad</label>
                                <p class="border-bottom pb-2">
                                    <span class="badge bg-secondary">
                                        <i class="bi bi-people"></i> ${sala.capacidad || sala.capacity || 'N/A'} personas
                                    </span>
                                </p>
                            </div>
                            <!-- Estado -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Estado</label>
                                <p class="border-bottom pb-2">
                                    ${getBadgeEstado(sala.estado || sala.status)}
                                </p>
                            </div>
                            <!-- Piso -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Piso</label>
                                <p class="border-bottom pb-2">${sala.piso || sala.floor || 'N/A'}</p>
                            </div>
                            <!-- Equipamiento -->
                            <div class="col-12">
                                <label class="fw-bold text-muted small">Equipamiento</label>
                                <p class="border-bottom pb-2">
                                    ${sala.equipamiento || sala.equipment || 'No especificado'}
                                </p>
                            </div>
                            <!-- Observaciones -->
                            <div class="col-12">
                                <label class="fw-bold text-muted small">Observaciones</label>
                                <p class="border-bottom pb-2">
                                    ${sala.observaciones || sala.observations || 'Sin observaciones'}
                                </p>
                            </div>
                            <!-- Fecha de Registro -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Fecha de Registro</label>
                                <p class="border-bottom pb-2">
                                    <i class="bi bi-calendar"></i> ${formatearFecha(sala.fechaRegistro || sala.registrationDate)}
                                </p>
                            </div>
                            <!-- Última Actualización -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Última Actualización</label>
                                <p class="border-bottom pb-2">
                                    <i class="bi bi-clock"></i> ${formatearFecha(sala.fechaActualizacion || sala.lastUpdate)}
                                </p>
                            </div>
                            <!-- Botones de acción -->
                            <div class="col-12 mt-3">
                                <hr>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-outline-warning btn-sm" onclick="alert('Editar sala ID: ${sala.id || sala.salaId}')">
                                        <i class="bi bi-pencil"></i> Editar
                                    </button>
                                    <button class="btn btn-outline-danger btn-sm" onclick="alert('Eliminar sala ID: ${sala.id || sala.salaId}')">
                                        <i class="bi bi-trash"></i> Eliminar
                                    </button>
                                    <button class="btn btn-outline-secondary btn-sm" onclick="window.print()">
                                        <i class="bi bi-printer"></i> Imprimir
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ========== CONSULTAR SALA ==========
        async function consultarSala(guid) {
            // Limpiar datos anteriores
            infoDiv.innerHTML = '';
            
            // Validar GUID
            if (!guid) {
                mostrarMensaje('warning', '⚠️ Por favor, ingresa un ID de sala');
                return;
            }

            // Validar formato GUID
            const guidRegex = /^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$/;
            if (!guidRegex.test(guid)) {
                mostrarMensaje('danger', '❌ Formato de GUID inválido. Usa el formato: 00000000-0000-0000-0000-000000000000');
                return;
            }

            try {
                mostrarMensaje('info', '⏳ Consultando sala...');
                
                // URL de la API - AJUSTAR SEGÚN TU ENDPOINT
                const url = `https://localhost:7285/api/Sala/${guid}`;
                // const url = `/api/Sala/${guid}`;
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error(`Sala con ID ${guid} no encontrada`);
                    }
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }
                
                const sala = await response.json();
                
                // Verificar si la respuesta tiene los datos esperados
                if (sala) {
                    mostrarSala(sala);
                    mostrarMensaje('success', '✅ Sala encontrada correctamente');
                } else {
                    throw new Error('No se recibieron datos de la sala');
                }
                
            } catch (error) {
                console.error('Error al consultar sala:', error);
                mostrarMensaje('danger', `❌ ${error.message}`);
                infoDiv.innerHTML = `
                    <div class="text-center text-muted py-5">
                        <i class="bi bi-building-x fs-1 d-block mb-2"></i>
                        Sala no encontrada
                    </div>
                `;
            }
        }

        // ========== EVENTOS ==========
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const guid = guidInput.value.trim();
            consultarSala(guid);
        });

        // Permitir consulta con Enter
        guidInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                form.dispatchEvent(new Event('submit'));
            }
        });

        // Función para autoformatear GUID mientras se escribe
        guidInput.addEventListener('input', function(e) {
            let value = this.value.replace(/[^a-fA-F0-9-]/g, '');
            value = value.replace(/-{2,}/g, '-');
            this.value = value;
        });

    })();
</script>

<!-- Estilos adicionales -->
<style>
    .card {
        border-radius: 12px;
        border: none;
        overflow: hidden;
    }
    .card-header {
        border-bottom: none;
    }
    .card-body p {
        font-size: 1rem;
        margin-bottom: 0.25rem;
        font-weight: 500;
    }
    .card-body .fw-bold {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .border-bottom {
        border-bottom: 1px solid #e9ecef !important;
        padding-bottom: 8px;
    }
    .badge {
        font-size: 0.85rem;
        padding: 0.35rem 0.65rem;
    }
    .badge.bg-purple {
        background-color: #6f42c1;
        color: white;
    }
    .alert {
        border-radius: 8px;
    }
    input:focus {
        box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        border-color: #86b7fe;
    }
    .btn-outline-primary:hover, 
    .btn-outline-warning:hover, 
    .btn-outline-danger:hover {
        color: white;
    }
</style>
