<div>
    <h5>Actualizar Sala</h5>
    
    <!-- Formulario para buscar por GUID -->
    <form id="buscarSalaForm" class="row g-3 mb-4">
        <div class="col-8">
            <label for="updateSalaGuid" class="form-label">ID de la Sala (GUID)</label>
            <input type="text" 
                   class="form-control" 
                   id="updateSalaGuid" 
                   placeholder="Ej: 123e4567-e89b-12d3-a456-426614174000"
                   pattern="^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$">
            <small class="text-muted">Ingresa el GUID de la sala que deseas actualizar</small>
        </div>
        <div class="col-4 d-flex align-items-end">
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-search"></i> Buscar Sala
            </button>
        </div>
    </form>

    <!-- Div donde se mostrarán los datos de la sala para editar -->
    <div id="salaUpdateInfo" class="mt-3">
        <!-- Los datos se mostrarán aquí cuando se consulte la sala -->
    </div>

    <!-- Mensajes de feedback -->
    <div id="mensajeUpdate" class="mt-3"></div>
</div>

<script>
    (function() {
        const buscarForm = document.getElementById('buscarSalaForm');
        const guidInput = document.getElementById('updateSalaGuid');
        const infoDiv = document.getElementById('salaUpdateInfo');
        const mensajeDiv = document.getElementById('mensajeUpdate');

        // Variable para almacenar la sala actual
        let salaActual = null;

        // ========== MOSTRAR MENSAJES ==========
        function mostrarMensaje(tipo, texto) {
            const colores = {
                success: 'success',
                danger: 'danger',
                info: 'info',
                warning: 'warning'
            };
            
            mensajeDiv.innerHTML = `
                <div class="alert alert-${colores[tipo] || 'info'} alert-dismissible fade show" role="alert">
                    ${texto}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            setTimeout(() => {
                const alert = mensajeDiv.querySelector('.alert');
                if (alert) {
                    alert.classList.remove('show');
                    setTimeout(() => mensajeDiv.innerHTML = '', 300);
                }
            }, 5000);
        }

        // ========== MOSTRAR FORMULARIO DE EDICIÓN ==========
        function mostrarFormularioEdicion(sala) {
            salaActual = sala;

            infoDiv.innerHTML = `
                <div class="card shadow-sm">
                    <div class="card-header bg-warning text-dark">
                        <h5 class="mb-0"><i class="bi bi-pencil-square"></i> Editar Sala</h5>
                    </div>
                    <div class="card-body">
                        <form id="editarSalaForm" class="row g-3">
                            <!-- ID (solo lectura) -->
                            <div class="col-12">
                                <label class="fw-bold text-muted small">ID de la Sala</label>
                                <input type="text" 
                                       class="form-control bg-light" 
                                       value="${sala.id || sala.salaId || 'N/A'}" 
                                       disabled>
                                <small class="text-muted">El ID no se puede modificar</small>
                            </div>
                            
                            <!-- Número de Sala -->
                            <div class="col-md-6">
                                <label for="editNumero" class="form-label">Número de Sala</label>
                                <input type="text" 
                                       class="form-control" 
                                       id="editNumero" 
                                       value="${sala.numero || sala.number || ''}"
                                       placeholder="Ej: 101, A-202"
                                       required>
                            </div>

                            <!-- Tipo de Sala -->
                            <div class="col-md-6">
                                <label for="editTipo" class="form-label">Tipo de Sala</label>
                                <select class="form-select" id="editTipo" required>
                                    <option value="">Selecciona un tipo...</option>
                                    <option value="consulta" ${sala.tipo === 'consulta' ? 'selected' : ''}>Consulta</option>
                                    <option value="cirugia" ${sala.tipo === 'cirugia' ? 'selected' : ''}>Cirugía</option>
                                    <option value="emergencia" ${sala.tipo === 'emergencia' ? 'selected' : ''}>Emergencia</option>
                                    <option value="hospitalizacion" ${sala.tipo === 'hospitalizacion' ? 'selected' : ''}>Hospitalización</option>
                                    <option value="terapia" ${sala.tipo === 'terapia' ? 'selected' : ''}>Terapia</option>
                                    <option value="rayos" ${sala.tipo === 'rayos' ? 'selected' : ''}>Rayos X</option>
                                    <option value="laboratorio" ${sala.tipo === 'laboratorio' ? 'selected' : ''}>Laboratorio</option>
                                </select>
                            </div>

                            <!-- Capacidad -->
                            <div class="col-md-6">
                                <label for="editCapacidad" class="form-label">Capacidad</label>
                                <input type="number" 
                                       class="form-control" 
                                       id="editCapacidad" 
                                       value="${sala.capacidad || sala.capacity || ''}"
                                       placeholder="Número de personas"
                                       min="1"
                                       required>
                            </div>

                            <!-- Piso -->
                            <div class="col-md-6">
                                <label for="editPiso" class="form-label">Piso</label>
                                <input type="text" 
                                       class="form-control" 
                                       id="editPiso" 
                                       value="${sala.piso || sala.floor || ''}"
                                       placeholder="Ej: 1, 2, PB, Sótano">
                            </div>

                            <!-- Estado -->
                            <div class="col-md-6">
                                <label for="editEstado" class="form-label">Estado</label>
                                <select class="form-select" id="editEstado" required>
                                    <option value="disponible" ${sala.estado === 'disponible' ? 'selected' : ''}>Disponible</option>
                                    <option value="ocupada" ${sala.estado === 'ocupada' ? 'selected' : ''}>Ocupada</option>
                                    <option value="mantenimiento" ${sala.estado === 'mantenimiento' ? 'selected' : ''}>En Mantenimiento</option>
                                    <option value="reservada" ${sala.estado === 'reservada' ? 'selected' : ''}>Reservada</option>
                                    <option value="limpieza" ${sala.estado === 'limpieza' ? 'selected' : ''}>En Limpieza</option>
                                </select>
                            </div>

                            <!-- Equipamiento -->
                            <div class="col-12">
                                <label for="editEquipamiento" class="form-label">Equipamiento</label>
                                <textarea class="form-control" 
                                          id="editEquipamiento" 
                                          rows="2"
                                          placeholder="Lista de equipos disponibles en la sala">${sala.equipamiento || sala.equipment || ''}</textarea>
                            </div>

                            <!-- Observaciones -->
                            <div class="col-12">
                                <label for="editObservaciones" class="form-label">Observaciones</label>
                                <textarea class="form-control" 
                                          id="editObservaciones" 
                                          rows="2"
                                          placeholder="Observaciones adicionales sobre la sala">${sala.observaciones || sala.observations || ''}</textarea>
                            </div>

                            <!-- Fecha de Registro (solo lectura) -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Fecha de Registro</label>
                                <input type="text" 
                                       class="form-control bg-light" 
                                       value="${sala.fechaRegistro ? new Date(sala.fechaRegistro).toLocaleString('es-ES') : 'N/A'}" 
                                       disabled>
                            </div>

                            <!-- Última Actualización (solo lectura) -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Última Actualización</label>
                                <input type="text" 
                                       class="form-control bg-light" 
                                       value="${sala.fechaActualizacion ? new Date(sala.fechaActualizacion).toLocaleString('es-ES') : 'N/A'}" 
                                       disabled>
                            </div>

                            <!-- Botones de acción -->
                            <div class="col-12 mt-3">
                                <hr>
                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-success">
                                        <i class="bi bi-check-circle"></i> Guardar Cambios
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary" onclick="limpiarFormulario()">
                                        <i class="bi bi-arrow-counterclockwise"></i> Cancelar
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            `;

            // Evento para el formulario de edición
            const editarForm = document.getElementById('editarSalaForm');
            editarForm.addEventListener('submit', function(e) {
                e.preventDefault();
                actualizarSala();
            });
        }

        // ========== LIMPIAR FORMULARIO ==========
        window.limpiarFormulario = function() {
            infoDiv.innerHTML = '';
            salaActual = null;
            guidInput.value = '';
            mostrarMensaje('info', 'Formulario limpiado');
        };

        // ========== ACTUALIZAR SALA ==========
        async function actualizarSala() {
            const numero = document.getElementById('editNumero').value.trim();
            const tipo = document.getElementById('editTipo').value;
            const capacidad = parseInt(document.getElementById('editCapacidad').value);
            const piso = document.getElementById('editPiso').value.trim();
            const estado = document.getElementById('editEstado').value;
            const equipamiento = document.getElementById('editEquipamiento').value.trim();
            const observaciones = document.getElementById('editObservaciones').value.trim();

            // Validar campos obligatorios
            if (!numero) {
                mostrarMensaje('warning', '⚠️ El número de sala es obligatorio');
                return;
            }

            if (!tipo) {
                mostrarMensaje('warning', '⚠️ El tipo de sala es obligatorio');
                return;
            }

            if (!capacidad || capacidad < 1) {
                mostrarMensaje('warning', '⚠️ La capacidad debe ser mayor a 0');
                return;
            }

            if (!estado) {
                mostrarMensaje('warning', '⚠️ El estado es obligatorio');
                return;
            }

            // Construir objeto de actualización
            const salaId = salaActual.id || salaActual.salaId;
            const datosActualizar = {
                id: salaId,
                numero: numero,
                tipo: tipo,
                capacidad: capacidad,
                piso: piso || null,
                estado: estado,
                equipamiento: equipamiento || null,
                observaciones: observaciones || null
            };

            try {
                mostrarMensaje('info', '⏳ Actualizando sala...');

                // URL de la API - AJUSTAR SEGÚN TU ENDPOINT
                const url = `https://localhost:7285/api/Sala/${salaId}`;
                // const url = `/api/Sala/${salaId}`;

                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(datosActualizar)
                });

                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error(`Sala con ID ${salaId} no encontrada`);
                    }
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.message || `Error ${response.status}: ${response.statusText}`);
                }

                const resultado = await response.json();
                
                mostrarMensaje('success', `✅ Sala "${resultado.numero}" actualizada correctamente`);
                
                // Actualizar los datos mostrados con la respuesta
                if (resultado) {
                    mostrarFormularioEdicion(resultado);
                }

            } catch (error) {
                console.error('Error al actualizar sala:', error);
                mostrarMensaje('danger', `❌ ${error.message}`);
            }
        }

        // ========== BUSCAR SALA ==========
        async function buscarSala(guid) {
            // Limpiar datos anteriores
            infoDiv.innerHTML = '';
            salaActual = null;
            
            // Validar GUID
            if (!guid) {
                mostrarMensaje('warning', '⚠️ Por favor, ingresa un ID de sala');
                return;
            }

            // Validar formato GUID
            const guidRegex = /^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$/;
            if (!guidRegex.test(guid)) {
                mostrarMensaje('danger', '❌ Formato de GUID inválido. Usa el formato: 00000000-0000-0000-0000-000000000000');
                return;
            }

            try {
                mostrarMensaje('info', '⏳ Buscando sala...');
                
                // URL de la API - AJUSTAR SEGÚN TU ENDPOINT
                const url = `https://localhost:7285/api/Sala/${guid}`;
                // const url = `/api/Sala/${guid}`;
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error(`Sala con ID ${guid} no encontrada`);
                    }
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }
                
                const sala = await response.json();
                
                if (sala) {
                    mostrarFormularioEdicion(sala);
                    mostrarMensaje('success', `✅ Sala "${sala.numero || sala.number}" encontrada. Puedes editar los campos.`);
                } else {
                    throw new Error('No se recibieron datos de la sala');
                }
                
            } catch (error) {
                console.error('Error al buscar sala:', error);
                mostrarMensaje('danger', `❌ ${error.message}`);
                infoDiv.innerHTML = `
                    <div class="text-center text-muted py-5">
                        <i class="bi bi-building-x fs-1 d-block mb-2"></i>
                        Sala no encontrada
                    </div>
                `;
            }
        }

        // ========== EVENTOS ==========
        buscarForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const guid = guidInput.value.trim();
            buscarSala(guid);
        });

        // Permitir búsqueda con Enter
        guidInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                buscarForm.dispatchEvent(new Event('submit'));
            }
        });

        // Autoformatear GUID mientras se escribe
        guidInput.addEventListener('input', function(e) {
            let value = this.value.replace(/[^a-fA-F0-9-]/g, '');
            value = value.replace(/-{2,}/g, '-');
            this.value = value;
        });

    })();
</script>

<!-- Estilos adicionales -->
<style>
    .card {
        border-radius: 12px;
        border: none;
        overflow: hidden;
    }
    .card-header {
        border-bottom: none;
    }
    .card-body .fw-bold {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .form-control:disabled {
        background-color: #e9ecef;
        cursor: not-allowed;
    }
    .alert {
        border-radius: 8px;
    }
    input:focus, select:focus, textarea:focus {
        box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        border-color: #86b7fe;
    }
    .btn-outline-secondary:hover {
        background-color: #6c757d;
        color: white;
    }
    .btn-success:hover {
        background-color: #1e7e34;
    }
</style>
