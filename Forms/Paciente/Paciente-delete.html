<div>
    <h5>Eliminar Paciente (Eliminación Lógica)</h5>
    
    <div class="alert alert-info">
        <i class="bi bi-info-circle"></i>
        <strong>Eliminación Lógica:</strong> El paciente será desactivado pero su información permanecerá en el sistema.
    </div>

    <!-- Formulario para buscar por GUID -->
    <form id="buscarPacienteForm" class="row g-3 mb-4">
        <div class="col-8">
            <label for="deletePacienteGuid" class="form-label">ID del Paciente (GUID)</label>
            <input type="text" 
                   class="form-control" 
                   id="deletePacienteGuid" 
                   placeholder="Ej: 123e4567-e89b-12d3-a456-426614174000"
                   pattern="^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$">
            <small class="text-muted">Ingresa el GUID del paciente que deseas eliminar</small>
        </div>
        <div class="col-4 d-flex align-items-end">
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-search"></i> Buscar Paciente
            </button>
        </div>
    </form>

    <!-- Div donde se mostrarán los datos del paciente para confirmar eliminación -->
    <div id="pacienteDeleteInfo" class="mt-3">
        <!-- Los datos se mostrarán aquí cuando se consulte el paciente -->
    </div>

    <!-- Mensajes de feedback -->
    <div id="mensajeDelete" class="mt-3"></div>
</div>

<script>
    (function() {
        const buscarForm = document.getElementById('buscarPacienteForm');
        const guidInput = document.getElementById('deletePacienteGuid');
        const infoDiv = document.getElementById('pacienteDeleteInfo');
        const mensajeDiv = document.getElementById('mensajeDelete');

        // Variable para almacenar el paciente actual
        let pacienteActual = null;

        // ========== MOSTRAR MENSAJES ==========
        function mostrarMensaje(tipo, texto) {
            const colores = {
                success: 'success',
                danger: 'danger',
                info: 'info',
                warning: 'warning'
            };
            
            mensajeDiv.innerHTML = `
                <div class="alert alert-${colores[tipo] || 'info'} alert-dismissible fade show" role="alert">
                    ${texto}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            setTimeout(() => {
                const alert = mensajeDiv.querySelector('.alert');
                if (alert) {
                    alert.classList.remove('show');
                    setTimeout(() => mensajeDiv.innerHTML = '', 300);
                }
            }, 8000);
        }

        // ========== MOSTRAR CONFIRMACIÓN DE ELIMINACIÓN ==========
        function mostrarConfirmacionEliminacion(paciente) {
            pacienteActual = paciente;

            const nombreCompleto = `${paciente.nombre || ''} ${paciente.apellido || ''}`.trim() || 'Sin nombre';

            infoDiv.innerHTML = `
                <div class="card shadow-sm border-danger">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Confirmar Eliminación</h5>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-warning">
                            <i class="bi bi-exclamation-triangle-fill"></i>
                            <strong>¿Estás seguro de que deseas eliminar a este paciente?</strong>
                            <br>
                            Esta acción es una <strong>eliminación lógica</strong>. El paciente será desactivado pero su información permanecerá en el sistema.
                        </div>

                        <div class="row g-3">
                            <!-- ID -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">ID</label>
                                <p class="border-bottom pb-2">${paciente.id || paciente.pacienteId || 'N/A'}</p>
                            </div>
                            <!-- Nombre Completo -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Nombre Completo</label>
                                <p class="border-bottom pb-2"><strong>${nombreCompleto}</strong></p>
                            </div>
                            <!-- Documento -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Documento</label>
                                <p class="border-bottom pb-2">${paciente.documento || paciente.document || 'N/A'}</p>
                            </div>
                            <!-- Género -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Género</label>
                                <p class="border-bottom pb-2">
                                    <span class="badge ${paciente.genero === 'Femenino' ? 'bg-pink' : paciente.genero === 'Masculino' ? 'bg-info' : 'bg-secondary'}">
                                        ${paciente.genero || 'N/A'}
                                    </span>
                                </p>
                            </div>
                            <!-- Estado -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Estado Actual</label>
                                <p class="border-bottom pb-2">
                                    <span class="badge ${paciente.activo !== false ? 'bg-success' : 'bg-danger'}">
                                        ${paciente.activo !== false ? 'Activo' : 'Inactivo'}
                                    </span>
                                </p>
                            </div>
                            <!-- Teléfono -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Teléfono</label>
                                <p class="border-bottom pb-2">${paciente.telefono || paciente.phone || 'N/A'}</p>
                            </div>
                        </div>

                        <!-- Botones de acción -->
                        <div class="mt-3">
                            <hr>
                            <div class="d-flex gap-2">
                                <button id="btnEliminarPaciente" class="btn btn-danger">
                                    <i class="bi bi-trash"></i> Confirmar Eliminación Lógica
                                </button>
                                <button type="button" class="btn btn-outline-secondary" onclick="limpiarFormulario()">
                                    <i class="bi bi-arrow-counterclockwise"></i> Cancelar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Evento para el botón de eliminar
            document.getElementById('btnEliminarPaciente').addEventListener('click', function() {
                eliminarPaciente();
            });
        }

        // ========== LIMPIAR FORMULARIO ==========
        window.limpiarFormulario = function() {
            infoDiv.innerHTML = '';
            pacienteActual = null;
            guidInput.value = '';
            mostrarMensaje('info', 'Formulario limpiado');
        };

        // ========== ELIMINAR PACIENTE (LÓGICO) ==========
        async function eliminarPaciente() {
            const pacienteId = pacienteActual.id || pacienteActual.pacienteId;
            const nombreCompleto = `${pacienteActual.nombre || ''} ${pacienteActual.apellido || ''}`.trim() || 'Sin nombre';

            try {
                mostrarMensaje('info', '⏳ Procesando eliminación lógica...');

                // URL de la API - AJUSTAR SEGÚN TU ENDPOINT
                const url = `https://localhost:7285/api/Paciente/${pacienteId}`;
                // const url = `/api/Paciente/${pacienteId}`;

                const response = await fetch(url, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error(`Paciente con ID ${pacienteId} no encontrado`);
                    }
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.message || `Error ${response.status}: ${response.statusText}`);
                }

                const resultado = await response.json().catch(() => ({}));
                
                mostrarMensaje('success', `✅ Paciente "${nombreCompleto}" eliminado lógicamente correctamente`);
                
                // Limpiar el formulario después de eliminar
                setTimeout(() => {
                    limpiarFormulario();
                }, 3000);

            } catch (error) {
                console.error('Error al eliminar paciente:', error);
                mostrarMensaje('danger', `❌ ${error.message}`);
            }
        }

        // ========== BUSCAR PACIENTE ==========
        async function buscarPaciente(guid) {
            // Limpiar datos anteriores
            infoDiv.innerHTML = '';
            pacienteActual = null;
            
            // Validar GUID
            if (!guid) {
                mostrarMensaje('warning', '⚠️ Por favor, ingresa un ID de paciente');
                return;
            }

            // Validar formato GUID
            const guidRegex = /^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$/;
            if (!guidRegex.test(guid)) {
                mostrarMensaje('danger', '❌ Formato de GUID inválido. Usa el formato: 00000000-0000-0000-0000-000000000000');
                return;
            }

            try {
                mostrarMensaje('info', '⏳ Buscando paciente...');
                
                // URL de la API - AJUSTAR SEGÚN TU ENDPOINT
                const url = `https://localhost:7285/api/Paciente/${guid}`;
                // const url = `/api/Paciente/${guid}`;
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error(`Paciente con ID ${guid} no encontrado`);
                    }
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }
                
                const paciente = await response.json();
                
                if (paciente) {
                    // Verificar si el paciente ya está inactivo
                    if (paciente.activo === false) {
                        const nombreCompleto = `${paciente.nombre || ''} ${paciente.apellido || ''}`.trim() || 'Sin nombre';
                        mostrarMensaje('warning', `⚠️ El paciente "${nombreCompleto}" ya se encuentra inactivo`);
                        infoDiv.innerHTML = `
                            <div class="text-center text-muted py-4">
                                <i class="bi bi-person-check fs-1 d-block mb-2"></i>
                                <p>Este paciente ya fue desactivado anteriormente</p>
                            </div>
                        `;
                        return;
                    }
                    
                    mostrarConfirmacionEliminacion(paciente);
                    const nombreCompleto = `${paciente.nombre || ''} ${paciente.apellido || ''}`.trim() || 'Sin nombre';
                    mostrarMensaje('info', `ℹ️ Paciente "${nombreCompleto}" encontrado. Confirma la eliminación lógica.`);
                } else {
                    throw new Error('No se recibieron datos del paciente');
                }
                
            } catch (error) {
                console.error('Error al buscar paciente:', error);
                mostrarMensaje('danger', `❌ ${error.message}`);
                infoDiv.innerHTML = `
                    <div class="text-center text-muted py-5">
                        <i class="bi bi-person-x fs-1 d-block mb-2"></i>
                        Paciente no encontrado
                    </div>
                `;
            }
        }

        // ========== EVENTOS ==========
        buscarForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const guid = guidInput.value.trim();
            buscarPaciente(guid);
        });

        // Permitir búsqueda con Enter
        guidInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                buscarForm.dispatchEvent(new Event('submit'));
            }
        });

        // Autoformatear GUID mientras se escribe
        guidInput.addEventListener('input', function(e) {
            let value = this.value.replace(/[^a-fA-F0-9-]/g, '');
            value = value.replace(/-{2,}/g, '-');
            this.value = value;
        });

    })();
</script>

<!-- Estilos adicionales -->
<style>
    .card {
        border-radius: 12px;
        border: none;
        overflow: hidden;
    }
    .card-header {
        border-bottom: none;
    }
    .card-body .fw-bold {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .border-bottom {
        border-bottom: 1px solid #e9ecef !important;
        padding-bottom: 8px;
    }
    .badge.bg-pink {
        background-color: #d63384;
        color: white;
    }
    .alert {
        border-radius: 8px;
    }
    input:focus {
        box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        border-color: #86b7fe;
    }
    .btn-danger:hover {
        background-color: #bb2d3b;
    }
</style>
