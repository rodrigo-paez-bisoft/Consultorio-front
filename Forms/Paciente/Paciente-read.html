<div>
    <h5>Consultar Paciente por ID</h5>
    
    <form id="consultarPacienteForm" class="row g-3">
        <!-- Campo para ingresar el GUID -->
        <div class="col-8">
            <label for="pacienteGuid" class="form-label">ID del Paciente (GUID)</label>
            <input type="text" 
                   class="form-control" 
                   id="pacienteGuid" 
                   placeholder="Ej: 123e4567-e89b-12d3-a456-426614174000"
                   pattern="^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$">
            <small class="text-muted">Formato: 00000000-0000-0000-0000-000000000000</small>
        </div>
        <div class="col-4 d-flex align-items-end">
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-search"></i> Consultar
            </button>
        </div>
    </form>

    <!-- Div donde se mostrarán los datos del paciente -->
    <div id="pacienteInfo" class="mt-4">
        <!-- Los datos se mostrarán aquí -->
    </div>

    <!-- Mensajes de feedback -->
    <div id="mensajeConsulta" class="mt-3"></div>
</div>

<script>
    (function() {
        const form = document.getElementById('consultarPacienteForm');
        const guidInput = document.getElementById('pacienteGuid');
        const infoDiv = document.getElementById('pacienteInfo');
        const mensajeDiv = document.getElementById('mensajeConsulta');

        // ========== MOSTRAR MENSAJES ==========
        function mostrarMensaje(tipo, texto) {
            const colores = {
                success: 'success',
                danger: 'danger',
                info: 'info',
                warning: 'warning'
            };
            
            mensajeDiv.innerHTML = `
                <div class="alert alert-${colores[tipo] || 'info'} alert-dismissible fade show" role="alert">
                    ${texto}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            setTimeout(() => {
                const alert = mensajeDiv.querySelector('.alert');
                if (alert) {
                    alert.classList.remove('show');
                    setTimeout(() => mensajeDiv.innerHTML = '', 300);
                }
            }, 5000);
        }

        // ========== MOSTRAR DATOS DEL PACIENTE ==========
        function mostrarPaciente(paciente) {
            // Función para formatear fecha
            function formatearFecha(fecha) {
                if (!fecha) return 'N/A';
                try {
                    return new Date(fecha).toLocaleDateString('es-ES', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                } catch {
                    return 'N/A';
                }
            }

            infoDiv.innerHTML = `
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0"><i class="bi bi-person-badge"></i> Información del Paciente</h5>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <!-- ID -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">ID</label>
                                <p class="border-bottom pb-2">${paciente.id || paciente.pacienteId || 'N/A'}</p>
                            </div>
                            <!-- Nombre -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Nombre</label>
                                <p class="border-bottom pb-2">${paciente.nombre || paciente.name || 'N/A'}</p>
                            </div>
                            <!-- Apellido -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Apellido</label>
                                <p class="border-bottom pb-2">${paciente.apellido || paciente.lastName || 'N/A'}</p>
                            </div>
                            <!-- Documento -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Documento</label>
                                <p class="border-bottom pb-2">${paciente.documento || paciente.document || 'N/A'}</p>
                            </div>
                            <!-- Fecha de Nacimiento -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Fecha de Nacimiento</label>
                                <p class="border-bottom pb-2">${formatearFecha(paciente.fechaNacimiento || paciente.birthDate)}</p>
                            </div>
                            <!-- Edad -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Edad</label>
                                <p class="border-bottom pb-2">
                                    <span class="badge bg-secondary">${paciente.edad || paciente.age || 'N/A'} años</span>
                                </p>
                            </div>
                            <!-- Género -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Género</label>
                                <p class="border-bottom pb-2">
                                    <span class="badge ${paciente.genero === 'Femenino' ? 'bg-pink' : paciente.genero === 'Masculino' ? 'bg-info' : 'bg-secondary'}">
                                        ${paciente.genero || paciente.gender || 'N/A'}
                                    </span>
                                </p>
                            </div>
                            <!-- Estado -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Estado</label>
                                <p class="border-bottom pb-2">
                                    <span class="badge ${paciente.activo !== false ? 'bg-success' : 'bg-danger'}">
                                        ${paciente.activo !== false ? 'Activo' : 'Inactivo'}
                                    </span>
                                </p>
                            </div>
                            <!-- Teléfono -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Teléfono</label>
                                <p class="border-bottom pb-2">${paciente.telefono || paciente.phone || 'N/A'}</p>
                            </div>
                            <!-- Email -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Email</label>
                                <p class="border-bottom pb-2">${paciente.email || 'N/A'}</p>
                            </div>
                            <!-- Dirección -->
                            <div class="col-12">
                                <label class="fw-bold text-muted small">Dirección</label>
                                <p class="border-bottom pb-2">${paciente.direccion || paciente.address || 'N/A'}</p>
                            </div>
                            <!-- Contacto de Emergencia -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Contacto de Emergencia</label>
                                <p class="border-bottom pb-2">${paciente.contactoEmergencia || paciente.emergencyContact || 'N/A'}</p>
                            </div>
                            <!-- Teléfono de Emergencia -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Teléfono de Emergencia</label>
                                <p class="border-bottom pb-2">${paciente.telefonoEmergencia || paciente.emergencyPhone || 'N/A'}</p>
                            </div>
                            <!-- Alergias -->
                            <div class="col-12">
                                <label class="fw-bold text-muted small">Alergias</label>
                                <p class="border-bottom pb-2">${paciente.alergias || paciente.allergies || 'Ninguna registrada'}</p>
                            </div>
                            <!-- Fecha de Registro -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Fecha de Registro</label>
                                <p class="border-bottom pb-2">${formatearFecha(paciente.fechaRegistro || paciente.registrationDate)}</p>
                            </div>
                            <!-- Última Actualización -->
                            <div class="col-md-6">
                                <label class="fw-bold text-muted small">Última Actualización</label>
                                <p class="border-bottom pb-2">${formatearFecha(paciente.fechaActualizacion || paciente.lastUpdate)}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ========== CONSULTAR PACIENTE ==========
        async function consultarPaciente(guid) {
            // Limpiar datos anteriores
            infoDiv.innerHTML = '';
            
            // Validar GUID
            if (!guid) {
                mostrarMensaje('warning', '⚠️ Por favor, ingresa un ID de paciente');
                return;
            }

            // Validar formato GUID
            const guidRegex = /^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$/;
            if (!guidRegex.test(guid)) {
                mostrarMensaje('danger', '❌ Formato de GUID inválido. Usa el formato: 00000000-0000-0000-0000-000000000000');
                return;
            }

            try {
                mostrarMensaje('info', '⏳ Consultando paciente...');
                
                // URL de la API - AJUSTAR SEGÚN TU ENDPOINT
                const url = `https://localhost:7285/api/Paciente/${guid}`;
                // const url = `/api/Paciente/${guid}`;
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error(`Paciente con ID ${guid} no encontrado`);
                    }
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }
                
                const paciente = await response.json();
                
                // Verificar si la respuesta tiene los datos esperados
                if (paciente) {
                    mostrarPaciente(paciente);
                    mostrarMensaje('success', '✅ Paciente encontrado correctamente');
                } else {
                    throw new Error('No se recibieron datos del paciente');
                }
                
            } catch (error) {
                console.error('Error al consultar paciente:', error);
                mostrarMensaje('danger', `❌ ${error.message}`);
                infoDiv.innerHTML = `
                    <div class="text-center text-muted py-5">
                        <i class="bi bi-person-x fs-1 d-block mb-2"></i>
                        Paciente no encontrado
                    </div>
                `;
            }
        }

        // ========== EVENTOS ==========
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const guid = guidInput.value.trim();
            consultarPaciente(guid);
        });

        // Permitir consulta con Enter
        guidInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                form.dispatchEvent(new Event('submit'));
            }
        });

        // Función para autoformatear GUID mientras se escribe
        guidInput.addEventListener('input', function(e) {
            let value = this.value.replace(/[^a-fA-F0-9-]/g, '');
            // Remover guiones extra
            value = value.replace(/-{2,}/g, '-');
            this.value = value;
        });

    })();
</script>

<!-- Estilos adicionales -->
<style>
    .card {
        border-radius: 12px;
        border: none;
        overflow: hidden;
    }
    .card-header {
        border-bottom: none;
    }
    .card-body p {
        font-size: 1rem;
        margin-bottom: 0.25rem;
        font-weight: 500;
    }
    .card-body .fw-bold {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .border-bottom {
        border-bottom: 1px solid #e9ecef !important;
        padding-bottom: 8px;
    }
    .badge {
        font-size: 0.85rem;
        padding: 0.35rem 0.65rem;
    }
    .badge.bg-pink {
        background-color: #d63384;
        color: white;
    }
    .alert {
        border-radius: 8px;
    }
    input:focus {
        box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        border-color: #86b7fe;
    }
</style>
