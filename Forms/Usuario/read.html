<div>
    <h5><i class="bi bi-eye text-primary"></i> Consultar Usuarios</h5>
    
    <div class="mb-3">
        <button class="btn btn-primary" onclick="cargarUsuarios()">
            <i class="bi bi-arrow-clockwise"></i> Cargar Usuarios
        </button>
        <button class="btn btn-outline-secondary" onclick="cargarUsuariosActivos()">
            <i class="bi bi-person-check"></i> Solo Activos
        </button>
    </div>

    <div id="usuariosLista" class="table-responsive">
        <div class="text-muted">Presiona "Cargar Usuarios" para ver la lista</div>
    </div>
    <div id="mensajeRead" class="mt-3"></div>
</div>

<script>
    document.addEventListener('formLoaded', function(e) {
        if (e.detail.ruta !== 'Usuario/read.html') return;
        
        window.cargarUsuarios = async function() {
            await cargarUsuariosLista(false);
        };

        window.cargarUsuariosActivos = async function() {
            await cargarUsuariosLista(true);
        };

        async function cargarUsuariosLista(soloActivos) {
            const listaDiv = document.getElementById('usuariosLista');
            const mensajeDiv = document.getElementById('mensajeRead');
            
            listaDiv.innerHTML = '<div class="text-muted">⏳ Cargando usuarios...</div>';

            try {
                const usuarios = await ApiService.getUsuarios();
                let filtered = usuarios;
                if (soloActivos) {
                    filtered = usuarios.filter(u => u.activo === true);
                }

                if (!filtered || filtered.length === 0) {
                    listaDiv.innerHTML = `
                        <div class="alert alert-info">
                            <i class="bi bi-info-circle"></i> No hay usuarios registrados
                        </div>
                    `;
                    return;
                }

                let html = `
                    <table class="table table-hover table-striped">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Usuario</th>
                                <th>Rol</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                filtered.forEach(u => {
                    html += `
                        <tr>
                            <td><code>${u.id || u.usuarioId}</code></td>
                            <td>${u.nombre || 'N/A'}</td>
                            <td><strong>${u.username || u.userName}</strong></td>
                            <td><span class="badge bg-info">${u.rol || 'Usuario'}</span></td>
                            <td>
                                ${u.activo ? 
                                    '<span class="badge bg-success">Activo</span>' : 
                                    '<span class="badge bg-danger">Inactivo</span>'
                                }
                            </td>
                        </tr>
                    `;
                });

                html += `</tbody></table>`;
                html += `<div class="text-muted">Total: ${filtered.length} usuarios</div>`;
                
                listaDiv.innerHTML = html;
                mostrarMensaje('success', `✅ ${filtered.length} usuarios cargados`);

            } catch (error) {
                listaDiv.innerHTML = `
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle-fill"></i> Error: ${error.message}
                    </div>
                `;
                mostrarMensaje('danger', `❌ ${error.message}`);
            }
        }

        function mostrarMensaje(tipo, texto) {
            const colores = { success: 'success', danger: 'danger', info: 'info', warning: 'warning' };
            const mensajeDiv = document.getElementById('mensajeRead');
            mensajeDiv.innerHTML = `
                <div class="alert alert-${colores[tipo] || 'info'} alert-dismissible fade show" role="alert">
                    ${texto}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            setTimeout(() => {
                const alert = mensajeDiv.querySelector('.alert');
                if (alert) {
                    alert.classList.remove('show');
                    setTimeout(() => mensajeDiv.innerHTML = '', 300);
                }
            }, 5000);
        }
    });
</script>
