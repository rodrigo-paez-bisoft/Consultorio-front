<div>
    <h5><i class="bi bi-person-plus text-success"></i> Crear Usuario</h5>
    <form id="createUsuarioForm" class="row g-3">
        <div class="col-md-6">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombre" placeholder="Nombre completo" required>
        </div>
        <div class="col-md-6">
            <label for="username" class="form-label">Usuario</label>
            <input type="text" class="form-control" id="username" placeholder="Nombre de usuario" required>
        </div>
        <div class="col-md-6">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" placeholder="Mínimo 6 caracteres" required>
        </div>
        <div class="col-md-6">
            <label for="rol" class="form-label">Rol</label>
            <select class="form-select" id="rol" required>
                <option value="">Selecciona...</option>
                <option value="Admin">Administrador</option>
                <option value="Doctor">Doctor</option>
                <option value="Recepcionista">Recepcionista</option>
            </select>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-success"><i class="bi bi-plus-circle"></i> Crear</button>
            <button type="reset" class="btn btn-outline-secondary"><i class="bi bi-arrow-counterclockwise"></i> Limpiar</button>
        </div>
    </form>
    <div id="mensaje" class="mt-3"></div>
</div>

<script>
    document.getElementById('createUsuarioForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const data = {
            nombre: document.getElementById('nombre').value.trim(),
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
            rol: document.getElementById('rol').value
        };
        if (!data.nombre || !data.username || !data.password || !data.rol) {
            mostrarMensaje('warning', '⚠️ Todos los campos son obligatorios');
            return;
        }
        try {
            await ApiService.registrarUsuario(data);
            mostrarMensaje('success', '✅ Usuario creado exitosamente');
            this.reset();
        } catch (error) {
            mostrarMensaje('danger', `❌ ${error.message}`);
        }
    });

    function mostrarMensaje(tipo, texto) {
        const div = document.getElementById('mensaje');
        const colores = { success: 'success', danger: 'danger', warning: 'warning', info: 'info' };
        div.innerHTML = `
            <div class="alert alert-${colores[tipo] || 'info'} alert-dismissible fade show">
                ${texto}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `;
        setTimeout(() => { const a = div.querySelector('.alert'); if(a) a.classList.remove('show'); }, 5000);
    }
</script>
